name: Test

on:
  push:
  pull_request:

jobs:
  bats:
    name: Run bats tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -q
          sudo apt-get install -y bats

      - name: Run bats tests
        run: bats --jobs $(nproc) tests/

  validate-syntax:
    name: Validate skill syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate skill syntax
        run: python3 scripts/validate-skill-syntax.py skills/

  check-forbidden-expressions:
    name: Forbidden Expressions check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden expressions
        run: |
          if grep -ri 'acceptance check' skills/ modules/ agents/ tests/ docs/ \
            | grep -v 'docs/spec/' \
            | grep -v 'Formerly called' \
            | grep -v '旧称' \
            | grep -v '| Acceptance check |'; then
            echo "Forbidden expression 'acceptance check' detected"
            exit 1
          fi
