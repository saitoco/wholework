name: Test

on:
  push:
  pull_request:

jobs:
  bats:
    name: Run bats tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -q
          sudo apt-get install -y bats

      - name: Run bats tests
        run: bats --jobs $(nproc) tests/

  validate-syntax:
    name: Validate skill syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate skill syntax
        run: python3 scripts/validate-skill-syntax.py skills/

  check-forbidden-expressions:
    name: Forbidden Expressions check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden expressions
        run: bash scripts/check-forbidden-expressions.sh

  macos-shell:
    name: macOS shell compatibility
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run shell scripts on macOS
        run: bash scripts/check-translation-sync.sh
